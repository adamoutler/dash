<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CI Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background: #f6f8fa; color: #24292e; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; }
        .add-btn { background: #2ea44f; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .add-form { background: white; padding: 20px; border-radius: 6px; border: 1px solid #e1e4e8; margin-bottom: 20px; display: none; }
        .add-form input, .add-form select { padding: 8px; margin-right: 10px; border: 1px solid #d1d5da; border-radius: 4px; font-size: 14px;}

        .repo-list { display: flex; flex-direction: column; gap: 10px; }
        .repo-item { display: flex; background: white; border: 1px solid #e1e4e8; border-radius: 6px; overflow: hidden; }

        .status-block { width: 120px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: bold; font-size: 18px; border-right: 1px solid #e1e4e8; }
        .status-success { background: #e6f4ea; color: #2e7d32; }
        .status-failure { background: #ffebee; color: #c62828; }
        .status-running { background: #fff8e1; color: #f57f17; }
        .status-error { background: #f6f8fa; color: #586069; }

        .info-block { flex-grow: 1; padding: 12px 15px; text-decoration: none; color: inherit; display: flex; flex-direction: column; justify-content: center; position: relative;}
        .info-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .repo-name { font-weight: bold; font-size: 18px; color: #0366d6; }
        .time-text { color: #586069; font-size: 14px; }
        .commit-msg { color: #586069; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 600px; }

        .actions-container { display: flex; gap: 15px; align-items: center; }
        .icon-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 0; opacity: 0.6; transition: opacity 0.2s; font-weight: bold; }
        .icon-btn:hover { opacity: 1; }
        .delete-btn { color: #cb2431; }
        .edit-btn { color: #0366d6; font-size: 20px; line-height: 18px; }

        .link-row { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
        .link-row input { flex: 1; margin: 0; }
        .remove-link-btn { background: none; border: none; color: #cb2431; cursor: pointer; font-size: 16px; font-weight: bold; padding: 0 5px; }
        .add-link-btn { background: none; border: 1px dashed #d1d5da; color: #586069; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 10px; }
        .custom-links-container { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 10px; }
        .custom-link { text-decoration: none; color: #0366d6; font-size: 13px; font-weight: bold; background: #f1f8ff; padding: 2px 6px; border-radius: 10px; }
        .custom-link:hover { background: #dbedff; }

        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fefefe; margin: 5% auto; padding: 20px; border: 1px solid #888; width: 80%; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .close-modal { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close-modal:hover, .close-modal:focus { color: black; text-decoration: none; cursor: pointer; }
        .log-container { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 6px; height: 400px; overflow-y: scroll; font-family: monospace; white-space: pre-wrap; font-size: 13px; }
    </style>
</head>
<body>
<div id="logModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="document.getElementById('logModal').style.display='none'">&times;</span>
    <h2 id="modalTitle" style="margin-top: 0;">Logs</h2>
    <div id="logContent" class="log-container">Loading...</div>
  </div>
</div>
<div class="container">
    <div class="header">
        <h1>CI Dashboard</h1>
        <button class="add-btn" onclick="toggleForm()">+ Add Repository</button>
    </div>

    <div class="add-form" id="addForm">
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <select id="provider">
                <option value="github">GitHub</option>
                <option value="forgejo">Forgejo / Gitea</option>
            </select>
            <input type="text" id="owner" placeholder="Owner (e.g. adamoutler)" required>
            <input type="text" id="repo" placeholder="Repo (e.g. dashboard)" required>
        </div>
        <div id="linksContainer">
            <!-- Dynamic links go here -->
        </div>
        <button type="button" class="add-link-btn" onclick="addLinkRow()">+ Add custom link (e.g. Prod, Jenkins, Docs)</button>
        <div style="margin-top: 15px;">
            <button class="add-btn" id="submitBtn" onclick="addRepo()">Add</button>
        </div>
    </div>

    <div class="repo-list" id="repoList">
        <!-- JS will populate -->
        <div style="padding: 20px; text-align: center; color: #586069;">Loading statuses...</div>
    </div>

    <footer style="margin-top: 40px; margin-bottom: 20px; text-align: center; font-size: 12px;">
        <a href="/llms.txt" aria-label="API automation instructions for AI and LLM agents" style="color: #bbb; text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='#666'" onmouseout="this.style.color='#bbb'">🤖 LLM API Instructions</a>
    </footer>
</div>

<script>
    function addLinkRow(name = '', url = '') {
        const container = document.getElementById('linksContainer');
        const row = document.createElement('div');
        row.className = 'link-row';
        row.innerHTML = `
            <input type="text" class="link-name" placeholder="Name (e.g. Prod)" value="${name}">
            <input type="url" class="link-url" placeholder="URL (e.g. https://...)" value="${url}">
            <button type="button" class="remove-link-btn" onclick="this.parentElement.remove()" title="Remove Link">✕</button>
        `;
        container.appendChild(row);
    }

    function toggleForm(isEdit = false, provider = 'github', owner = '', repo = '', customLinksRaw = '') {
        const form = document.getElementById('addForm');
        document.getElementById('linksContainer').innerHTML = ''; // clear links

        let customLinks = [];
        try {
            if (customLinksRaw) customLinks = JSON.parse(decodeURIComponent(customLinksRaw));
        } catch(e) {}

        if (isEdit === true) {
            document.getElementById('provider').value = provider;
            document.getElementById('owner').value = owner;
            document.getElementById('repo').value = repo;
            document.getElementById('owner').readOnly = true;
            document.getElementById('repo').readOnly = true;
            document.getElementById('provider').disabled = true;
            document.getElementById('submitBtn').innerText = 'Update';

            customLinks.forEach(link => addLinkRow(link.name, link.url));

            form.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
            if (form.style.display === 'block' && document.getElementById('submitBtn').innerText !== 'Update') {
                form.style.display = 'none';
            } else {
                document.getElementById('owner').readOnly = false;
                document.getElementById('repo').readOnly = false;
                document.getElementById('provider').disabled = false;
                document.getElementById('owner').value = '';
                document.getElementById('repo').value = '';
                document.getElementById('submitBtn').innerText = 'Add';
                form.style.display = 'block';
            }
        }
    }

    async function addRepo() {
        const provider = document.getElementById('provider').value;
        const owner = document.getElementById('owner').value;
        const repo = document.getElementById('repo').value;

        const linkRows = document.querySelectorAll('.link-row');
        const custom_links = [];
        linkRows.forEach(row => {
            const name = row.querySelector('.link-name').value.trim();
            const url = row.querySelector('.link-url').value.trim();
            if (name && url) {
                custom_links.push({ name, url });
            }
        });

        if(!owner || !repo) return;

        await fetch('/api/repos', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({provider, owner, repo, custom_links})
        });

        document.getElementById('owner').value = '';
        document.getElementById('repo').value = '';
        document.getElementById('submitBtn').innerText = 'Add';
        document.getElementById('owner').readOnly = false;
        document.getElementById('repo').readOnly = false;
        document.getElementById('provider').disabled = false;
        document.getElementById('linksContainer').innerHTML = '';

        document.getElementById('addForm').style.display = 'none';
        fetchStatuses();
    }

    async function removeRepo(provider, owner, repo) {
        await fetch('/api/repos', {
            method: 'DELETE',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({provider, owner, repo})
        });
        fetchStatuses();
    }

    function formatTime(isoString) {
        if (!isoString) return "Unknown";
        const d = new Date(isoString);
        return d.toLocaleString();
    }

    function getStatusClass(status) {
        if(status === 'success') return 'status-success';
        if(status === 'failure') return 'status-failure';
        if(status === 'running') return 'status-running';
        return 'status-error';
    }

    function getStatusIcon(status) {
        if(status === 'success') return '✔ Pass';
        if(status === 'failure') return '✘ Fail';
        if(status === 'running') return '↻ Run';
        return '? Error';
    }

    let dashboardData = [];

    function updateProgress() {
        if (!dashboardData) return;
        const now = Date.now();

        dashboardData.forEach(item => {
            if (item.status === 'running' && item.average_recent_duration > 0 && item.started_at) {
                const repoId = `${item.provider}-${item.owner}-${item.repo}`.replace(/[^a-zA-Z0-9-]/g, '-');
                const progressEl = document.getElementById(`progress-${repoId}`);
                const etaEl = document.getElementById(`eta-${repoId}`);

                if (progressEl && etaEl) {
                    const started = new Date(item.started_at).getTime();
                    const elapsedSec = (now - started) / 1000;

                    if (elapsedSec > item.average_recent_duration) {
                        progressEl.style.width = '100%';
                        etaEl.innerText = '(Overtime)';
                    } else {
                        const percent = Math.min(100, Math.max(0, (elapsedSec / item.average_recent_duration) * 100));
                        progressEl.style.width = `${percent}%`;
                        const remaining = Math.max(0, Math.ceil(item.average_recent_duration - elapsedSec));
                        etaEl.innerText = `(ETA: ${remaining}s)`;
                    }
                }
            }
        });
    }

    async function fetchStatuses() {
        const res = await fetch('/api/status');
        dashboardData = await res.json();

        const list = document.getElementById('repoList');
        if (dashboardData.length === 0) {
            list.innerHTML = '<div style="padding: 20px; text-align: center; color: #586069;">No repositories added yet.</div>';
            return;
        }

        list.innerHTML = dashboardData.map(item => {
            const linksHtml = (item.custom_links && item.custom_links.length > 0) ?
                `<div class="custom-links-container">
                    ${item.custom_links.map(link => `<a href="${link.url}" target="_blank" class="custom-link">🔗 ${link.name}</a>`).join('')}
                </div>` : '';

            const customLinksEncoded = encodeURIComponent(JSON.stringify(item.custom_links || []));
            const repoId = `${item.provider}-${item.owner}-${item.repo}`.replace(/[^a-zA-Z0-9-]/g, '-');

            let progressHtml = '';
            if (item.status === 'running' && item.average_recent_duration > 0 && item.started_at) {
                progressHtml = `
                    <div style="width: 80%; height: 4px; background: rgba(0,0,0,0.1); margin-top: 5px; position: relative; border-radius: 2px; overflow: hidden;">
                        <div id="progress-${repoId}" style="height: 100%; background: #f57f17; width: 0%; transition: width 1s linear;"></div>
                    </div>
                    <div id="eta-${repoId}" style="font-size: 11px; margin-top: 3px; font-weight: normal; line-height: 1.2;">Calculating...</div>
                `;
            }

            return `
            <div class="repo-item">
                <a href="${item.url}" target="_blank" class="status-block ${getStatusClass(item.status)}" style="${progressHtml ? 'flex-direction: column; padding: 10px; gap: 4px;' : ''}">
                    <div>${getStatusIcon(item.status)}</div>
                    ${progressHtml}
                </a>                <div class="info-block">
                    <div class="info-header">
                        <a href="${item.repo_url}" target="_blank" style="text-decoration: none; color: inherit; flex-grow: 1;">
                            <span class="repo-name">${item.owner}/${item.repo}</span>
                        </a>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <span class="time-text">${formatTime(item.updated_at)}</span>
                            <div class="actions-container">
                                <button class="icon-btn" style="color: #6a737d;" onclick="fetchLogs('${item.provider}', '${item.owner}', '${item.repo}')" title="View Logs">📄</button>
                                <button class="icon-btn edit-btn" onclick="toggleForm(true, '${item.provider}', '${item.owner}', '${item.repo}', '${customLinksEncoded}')" title="Edit">✎</button>
                                <button class="icon-btn delete-btn" onclick="removeRepo('${item.provider}', '${item.owner}', '${item.repo}')" title="Remove">✕</button>
                            </div>
                        </div>
                    </div>
                    <a href="${item.repo_url}" target="_blank" style="text-decoration: none; color: inherit;">
                        <div class="commit-msg">${item.commit_message || 'No commit info'}</div>
                    </a>
                    ${linksHtml}
                </div>
            </div>
        `}).join('');
    }

    // Initial fetch and poll every 30s
    fetchStatuses();
    setInterval(fetchStatuses, 30000);
    setInterval(updateProgress, 1000);

    async function fetchLogs(provider, owner, repo) {
        document.getElementById('modalTitle').innerText = `Logs: ${owner}/${repo}`;
        const logContent = document.getElementById('logContent');
        logContent.innerHTML = 'Loading logs...';
        document.getElementById('logModal').style.display = 'block';

        try {
            const res = await fetch(`/api/logs?provider=${encodeURIComponent(provider)}&owner=${encodeURIComponent(owner)}&repo=${encodeURIComponent(repo)}`);
            const data = await res.json();

            // Format log message links for Forgejo
            if (data.log && data.log.includes('href=')) {
                logContent.innerHTML = data.log;
            } else {
                logContent.innerText = data.log || 'No logs returned.';
            }

            // Scroll to bottom
            setTimeout(() => { logContent.scrollTop = logContent.scrollHeight; }, 100);
        } catch (e) {
            logContent.innerText = 'Error fetching logs: ' + e.message;
        }
    }

    // Close modal when clicking outside of it
    window.onclick = function(event) {
        const modal = document.getElementById('logModal');
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>
</body>
</html>
