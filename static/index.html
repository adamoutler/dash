<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CI Dashboard</title>
    <link rel="stylesheet" href="/static/design-system.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <style>
        .cascading-browser-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 10px;
        }
        .browser-level {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-surface);
            color: var(--text-primary);
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }
        .browser-level:focus {
            outline: none;
            border-color: #0366d6;
            box-shadow: 0 0 0 3px rgba(3, 102, 214, 0.3);
        }
    </style>
</head>
<body>
<div id="logModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="document.getElementById('logModal').style.display='none'">&times;</span>
    <h2 id="modalTitle" style="margin-top: 0;">Logs</h2>
    <div id="logContent" class="log-container">Loading...</div>
  </div>
</div>
<div class="container">
    <div class="header">
        <h1>CI Dashboard</h1>
        <div class="header-right">
            <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Dark Mode">
                <span id="themeIcon">☀️</span>
            </button>
            <button class="add-btn" onclick="toggleForm()">+ Add Repository</button>
        </div>
    </div>

    <div class="add-form" id="addForm">
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <select id="provider" style="flex: 1; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; background-color: var(--bg-surface); color: var(--text-primary);">
                <option value="github">GitHub</option>
                <option value="forgejo">Forgejo / Gitea</option>
                <option value="jenkins">Jenkins</option>
            </select>
        </div>
        <div id="cascadingBrowser" class="cascading-browser-container"></div>
        <input type="hidden" id="owner" value="">
        <input type="hidden" id="repo" value="">
        <input type="hidden" id="workflow" value="">
        <input type="hidden" id="workflowName" value="">
        <div id="linksContainer">
            <!-- Dynamic links go here -->
        </div>
        <button type="button" class="add-link-btn" onclick="addLinkRow()">+ Add custom link (e.g. Prod, Jenkins, Docs)</button>
        <div style="margin-top: 15px;">
            <button class="add-btn" id="submitBtn" onclick="addRepo()">Add</button>
        </div>
    </div>

    <div class="repo-list" id="repoList">
        <!-- JS will populate -->
        <div style="padding: 20px; text-align: center; color: #586069;">Loading statuses...</div>
    </div>

    <footer style="margin-top: 40px; margin-bottom: 20px; text-align: center; font-size: 12px;">
        <a href="/configure" aria-label="Dashboard configuration" style="color: #bbb; text-decoration: none; transition: color 0.2s; margin-right: 15px;" onmouseover="this.style.color='#666'" onmouseout="this.style.color='#bbb'">⚙️ Configure Dashboard</a>
        <a href="/api" aria-label="API Documentation" style="color: #bbb; text-decoration: none; transition: color 0.2s; margin-right: 15px;" onmouseover="this.style.color='#666'" onmouseout="this.style.color='#bbb'">📚 API Docs</a>
        <a href="/llms.txt" aria-label="API automation instructions for AI and LLM agents" style="color: #bbb; text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='#666'" onmouseout="this.style.color='#bbb'">🤖 LLM API Instructions</a>
    </footer>
</div>

<script>
    class CascadingPathBrowser {
        constructor(containerId, providerSelectId) {
            this.container = document.getElementById(containerId);
            this.providerSelect = document.getElementById(providerSelectId);
            this.levels = [];
            this.providerSelect.addEventListener('change', () => this.reset());
        }

        reset() {
            this.container.innerHTML = '';
            this.levels = [];
            this.loadLevel('');
            this.updateHiddenFields();
        }

        async loadLevel(path, levelIndex = 0) {
            while (this.levels.length > levelIndex) {
                this.levels.pop().remove();
            }

            const provider = this.providerSelect.value;
            const select = document.createElement('select');
            select.className = 'browser-level';
            select.innerHTML = '<option value="">Loading...</option>';
            this.container.appendChild(select);
            this.levels.push(select);

            try {
                const res = await fetch(`/api/explore/${provider}/nodes?path=${encodeURIComponent(path)}`);
                if (!res.ok) throw new Error('Failed to fetch');
                const data = await res.json();

                select.innerHTML = '<option value="">-- Select --</option>';
                data.nodes.forEach(node => {
                    const opt = document.createElement('option');
                    opt.value = node.path;
                    opt.textContent = node.name;
                    opt.dataset.type = node.type;
                    opt.dataset.hasChildren = node.has_children;
                    opt.dataset.url = node.url || '';
                    opt.dataset.id = node.id || '';
                    select.appendChild(opt);
                });

                select.addEventListener('change', () => {
                    const selectedOpt = select.options[select.selectedIndex];
                    if (!selectedOpt || !selectedOpt.value) {
                        while (this.levels.length > levelIndex + 1) {
                            this.levels.pop().remove();
                        }
                        this.updateHiddenFields();
                        return;
                    }

                    if (selectedOpt.dataset.hasChildren === 'true') {
                        this.loadLevel(selectedOpt.value, levelIndex + 1);
                    } else {
                        while (this.levels.length > levelIndex + 1) {
                            this.levels.pop().remove();
                        }
                    }
                    this.updateHiddenFields();
                });

            } catch (e) {
                select.innerHTML = `<option value="">None found or Error</option>`;
                console.error(e);
            }

            this.updateHiddenFields();
        }

        updateHiddenFields() {
            const provider = this.providerSelect.value;
            let owner = '';
            let repo = '';
            let workflowId = '';
            let workflowName = '';

            if (provider === 'jenkins') {
                const lastSelect = this.levels[this.levels.length - 1];
                if (lastSelect && lastSelect.selectedIndex > 0) {
                    const opt = lastSelect.options[lastSelect.selectedIndex];
                    owner = opt.textContent;
                    repo = opt.dataset.url || opt.value;
                } else if (this.levels.length > 1) {
                    const prevSelect = this.levels[this.levels.length - 2];
                    if (prevSelect && prevSelect.selectedIndex > 0) {
                        const opt = prevSelect.options[prevSelect.selectedIndex];
                        owner = opt.textContent;
                        repo = opt.dataset.url || opt.value;
                    }
                }
            } else {
                if (this.levels[0] && this.levels[0].selectedIndex > 0) {
                    owner = this.levels[0].options[this.levels[0].selectedIndex].dataset.id;
                }
                if (this.levels[1] && this.levels[1].selectedIndex > 0) {
                    repo = this.levels[1].options[this.levels[1].selectedIndex].dataset.id;
                }
                if (this.levels[2] && this.levels[2].selectedIndex > 0) {
                    const opt = this.levels[2].options[this.levels[2].selectedIndex];
                    workflowId = opt.dataset.id;
                    workflowName = opt.textContent;
                }
            }

            document.getElementById('owner').value = owner || '';
            document.getElementById('repo').value = repo || '';
            document.getElementById('workflow').value = workflowId || '';
            document.getElementById('workflowName').value = workflowName || '';
        }

        setEditMode(owner, repo, workflowId, workflowName) {
            this.container.innerHTML = '';
            this.levels = [];

            const createInput = (val, placeholder) => {
                const input = document.createElement('input');
                input.type = 'text';
                input.value = val;
                input.placeholder = placeholder;
                input.readOnly = true;
                input.style.flex = '1';
                input.style.padding = '8px';
                input.style.border = '1px solid var(--border-color)';
                input.style.borderRadius = '4px';
                input.style.backgroundColor = 'var(--bg-primary)';
                input.style.color = 'var(--text-primary)';
                input.style.boxSizing = 'border-box';
                return input;
            };

            const row = document.createElement('div');
            row.style.display = 'flex';
            row.style.gap = '10px';

            row.appendChild(createInput(owner, 'Owner'));
            row.appendChild(createInput(repo, 'Repo'));

            this.container.appendChild(row);

            if (workflowId || workflowName) {
                const wfRow = document.createElement('div');
                wfRow.style.display = 'flex';
                wfRow.style.gap = '10px';
                wfRow.style.marginTop = '10px';
                wfRow.appendChild(createInput(workflowName || workflowId, 'Workflow'));
                this.container.appendChild(wfRow);
            }

            document.getElementById('owner').value = owner || '';
            document.getElementById('repo').value = repo || '';
            document.getElementById('workflow').value = workflowId || '';
            document.getElementById('workflowName').value = workflowName || '';
        }
    }
    let pathBrowser;

    function addLinkRow(name = '', url = '') {
        const container = document.getElementById('linksContainer');
        const row = document.createElement('div');
        row.className = 'link-row';
        row.innerHTML = `
            <input type="text" class="link-name" placeholder="Name (e.g. Prod)" value="${name}">
            <input type="url" class="link-url" placeholder="URL (e.g. https://...)" value="${url}">
            <button type="button" class="remove-link-btn" onclick="this.parentElement.remove()" title="Remove Link">✕</button>
        `;
        container.appendChild(row);
    }

    function toggleForm(isEdit = false, provider = 'github', owner = '', repo = '', customLinksRaw = '', workflowId = '', workflowName = '') {
        const form = document.getElementById('addForm');
        document.getElementById('linksContainer').innerHTML = ''; // clear links

        if (!pathBrowser) {
            pathBrowser = new CascadingPathBrowser('cascadingBrowser', 'provider');
        }

        let customLinks = [];
        try {
            if (customLinksRaw) customLinks = JSON.parse(decodeURIComponent(customLinksRaw));
        } catch(e) {}

        if (isEdit === true) {
            document.getElementById('provider').value = provider;
            document.getElementById('provider').disabled = true;
            document.getElementById('submitBtn').innerText = 'Update';

            pathBrowser.setEditMode(owner, repo, workflowId, workflowName);

            customLinks.forEach(link => addLinkRow(link.name, link.url));

            form.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
            if (form.style.display === 'block' && document.getElementById('submitBtn').innerText !== 'Update') {
                form.style.display = 'none';
            } else {
                document.getElementById('provider').value = 'github';
                document.getElementById('provider').disabled = false;
                document.getElementById('submitBtn').innerText = 'Add';

                pathBrowser.reset();

                form.style.display = 'block';
            }
        }
    }

    async function addRepo() {
        const provider = document.getElementById('provider').value;
        const owner = document.getElementById('owner').value.trim();
        const repo = document.getElementById('repo').value.trim();
        const workflow_id = document.getElementById('workflow').value.trim();
        const workflow_name = document.getElementById('workflowName').value.trim();

        const linkRows = document.querySelectorAll('.link-row');
        const custom_links = [];
        linkRows.forEach(row => {
            const name = row.querySelector('.link-name').value.trim();
            const url = row.querySelector('.link-url').value.trim();
            if (name && url) {
                custom_links.push({ name, url });
            }
        });

        if(!owner || !repo) return;

        await fetch('/api/repos', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({provider, owner, repo, custom_links, workflow_id, workflow_name})
        });

        document.getElementById('submitBtn').innerText = 'Add';
        document.getElementById('provider').disabled = false;
        document.getElementById('linksContainer').innerHTML = '';

        document.getElementById('addForm').style.display = 'none';
        if (pathBrowser) pathBrowser.reset();
        fetchStatuses();
    }

    async function removeRepo(provider, owner, repo, workflowId) {
        await fetch('/api/repos', {
            method: 'DELETE',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({provider, owner, repo, workflow_id: workflowId || null})
        });
        fetchStatuses();
    }

    function formatTime(isoString) {
        if (!isoString) return "Unknown";
        const d = new Date(isoString);
        return d.toLocaleString();
    }

    function getStatusClass(status) {
        if(status === 'success') return 'status-success';
        if(status === 'failure') return 'status-failure';
        if(status === 'running') return 'status-running';
        return 'status-error';
    }

    function getStatusIcon(status) {
        if(status === 'success') return '✔ Pass';
        if(status === 'failure') return '✘ Fail';
        if(status === 'running') return '↻ Run';
        return '? Error';
    }

    let dashboardData = [];

    function updateProgress() {
        if (!dashboardData) return;
        const now = Date.now();

        dashboardData.forEach(item => {
            let duration = item.expected_duration_sec || item.average_recent_duration || 0;
            if (item.status === 'running' && duration > 0 && item.started_at) {
                const repoId = `${item.provider}-${item.owner}-${item.repo}-${item.workflow_id || 'all'}`.replace(/[^a-zA-Z0-9-]/g, '-');
                const progressEl = document.getElementById(`progress-${repoId}`);
                const etaEl = document.getElementById(`eta-${repoId}`);

                if (progressEl && etaEl) {
                    const started = new Date(item.started_at).getTime();
                    const elapsedSec = (now - started) / 1000;

                    if (elapsedSec > duration) {
                        progressEl.style.width = '100%';
                        etaEl.innerText = '(Overtime)';
                    } else {
                        const percent = Math.min(100, Math.max(0, (elapsedSec / duration) * 100));
                        progressEl.style.width = `${percent}%`;
                        const remaining = Math.max(0, Math.ceil(duration - elapsedSec));
                        etaEl.innerText = `(ETA: ${remaining}s)`;
                    }
                }
            }
        });
    }

    async function fetchStatuses() {
        try {
            const res = await fetch('/api/status', { cache: 'no-store' });
            if (res.status === 401) {
                const list = document.getElementById('repoList');
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: #cb2431;">Authentication required. Please refresh the page to login.</div>';
                return;
            }
            dashboardData = await res.json();

            if (!Array.isArray(dashboardData)) {
                const list = document.getElementById('repoList');
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: #cb2431;">Error: Invalid data received from server.</div>';
                return;
            }

            const list = document.getElementById('repoList');
            if (dashboardData.length === 0) {
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: #586069;">No repositories added yet.</div>';
                return;
            }

        list.innerHTML = dashboardData.map(item => {
            const linksHtml = (item.custom_links && item.custom_links.length > 0) ?
                `<div class="custom-links-container">
                    ${item.custom_links.map(link => `<a href="${link.url}" target="_blank" class="custom-link">🔗 ${link.name}</a>`).join('')}
                </div>` : '';

            const customLinksEncoded = encodeURIComponent(JSON.stringify(item.custom_links || []));
            const repoId = `${item.provider}-${item.owner}-${item.repo}-${item.workflow_id || 'all'}`.replace(/[^a-zA-Z0-9-]/g, '-');

            let progressHtml = '';
            let duration = item.expected_duration_sec || item.average_recent_duration || 0;
            if (item.status === 'running' && duration > 0 && item.started_at) {
                progressHtml = `
                    <div style="width: 80%; height: 4px; background: rgba(0,0,0,0.1); margin-top: 5px; position: relative; border-radius: 2px; overflow: hidden;">
                        <div id="progress-${repoId}" style="height: 100%; background: #f57f17; width: 0%; transition: width 1s linear;"></div>
                    </div>
                    <div id="eta-${repoId}" style="font-size: 11px; margin-top: 3px; font-weight: normal; line-height: 1.2;">Calculating...</div>
                `;
            }

            const wfDisplay = item.workflow_name ? ` <span style="font-size: 14px; color: #586069; font-weight: normal;">(${item.workflow_name})</span>` : '';
            const displayName = item.provider === 'jenkins' ? item.owner : `${item.owner}/${item.repo}`;

            let baseUrl = '';
            try {
                baseUrl = new URL(item.repo_url !== '#' ? item.repo_url : item.url).origin;
            } catch (e) {
                baseUrl = 'https://github.com';
            }

            let iconPath = '/favicon.ico';
            if (item.provider === 'forgejo') {
                iconPath = '/assets/img/favicon.svg';
            }

            const faviconHtml = `<img src="${baseUrl}${iconPath}" style="width: 18px; height: 18px; margin-right: 8px; vertical-align: middle;" onerror="this.style.display='none'">`;

            return `
            <div class="repo-item">
                <a href="${item.url}" target="_blank" class="status-block ${getStatusClass(item.status)}" style="${progressHtml ? 'flex-direction: column; padding: 10px; gap: 4px;' : ''}">
                    <div>${getStatusIcon(item.status)}</div>
                    ${progressHtml}
                </a>                <div class="info-block">
                    <div class="info-header">
                        <a href="${item.repo_url}" target="_blank" style="text-decoration: none; color: inherit; flex-grow: 1; display: flex; align-items: center; min-width: 0;">
                            ${faviconHtml}<span class="repo-name">${displayName}${wfDisplay}</span>
                        </a>
                        <div style="display: flex; align-items: center; gap: 15px; flex-shrink: 0;">
                            <span class="time-text">${formatTime(item.updated_at)}</span>
                            <div class="actions-container">
                                <button class="icon-btn" style="color: #6a737d;" onclick="fetchLogs('${item.provider}', '${item.owner}', '${item.repo}', '${item.workflow_id || ''}')" title="View Logs">📄</button>
                                <button class="icon-btn edit-btn" onclick="toggleForm(true, '${item.provider}', '${item.owner}', '${item.repo}', '${customLinksEncoded}', '${item.workflow_id || ''}', '${item.workflow_name || ''}')" title="Edit">✎</button>
                                <button class="icon-btn delete-btn" onclick="removeRepo('${item.provider}', '${item.owner}', '${item.repo}', '${item.workflow_id || ''}')" title="Remove">✕</button>
                            </div>
                        </div>
                    </div>
                    <a href="${item.repo_url}" target="_blank" style="text-decoration: none; color: inherit;">
                        <div class="commit-msg">${item.commit_message || 'No commit info'}</div>
                    </a>
                    ${linksHtml}
                </div>
            </div>
        `}).join('');
        } catch (e) {
            console.error("Error fetching statuses:", e);
            const list = document.getElementById('repoList');
            list.innerHTML = '<div style="padding: 20px; text-align: center; color: #cb2431;">Error fetching data. Check console for details.</div>';
        }
    }

    function updateThemeIcon() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const icon = document.getElementById('themeIcon');
        if (icon) {
            icon.innerText = currentTheme === 'dark' ? '🌙' : '☀️';
        }
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon();
    }

    // Set initial icon on load
    updateThemeIcon();

    // Initial fetch and poll every 30s
    fetchStatuses();
    setInterval(fetchStatuses, 30000);
    setInterval(updateProgress, 1000);

    async function fetchLogs(provider, owner, repo, workflowId) {
        document.getElementById('modalTitle').innerText = `Logs: ${owner}/${repo}${workflowId ? ' (' + workflowId + ')' : ''}`;
        const logContent = document.getElementById('logContent');
        logContent.innerHTML = 'Loading logs...';
        document.getElementById('logModal').style.display = 'block';

        let url = `/api/logs?provider=${encodeURIComponent(provider)}&owner=${encodeURIComponent(owner)}&repo=${encodeURIComponent(repo)}`;
        if (workflowId) {
            url += `&workflow_id=${encodeURIComponent(workflowId)}`;
        }

        try {
            const res = await fetch(url, { cache: 'no-store' });
            const data = await res.json();

            // Format log message links for Forgejo
            if (data.log && data.log.includes('href=')) {
                logContent.innerHTML = data.log;
            } else {
                logContent.innerText = data.log || 'No logs returned.';
            }

            // Scroll to bottom
            setTimeout(() => { logContent.scrollTop = logContent.scrollHeight; }, 100);
        } catch (e) {
            logContent.innerText = 'Error fetching logs: ' + e.message;
        }
    }

    // Close modal when clicking outside of it
    window.onclick = function(event) {
        const modal = document.getElementById('logModal');
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>
</body>
</html>
