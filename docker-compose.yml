services:
  ci-dashboard:
    build: .
    ports:
      - "28080:8000" # High port mapping to the container's 8000 port
    environment:
      FORGEJO_URL: "https://git.adamoutler.com"
      FORGEJO_TOKEN: "${FORGEJO_TOKEN}"
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
    volumes:
      - dashboard_data:/app/data
    restart: unless-stopped

volumes:
  dashboard_data:
