services:
  ci-dashboard:
    build: .
    ports:
      - "28080:8000" # High port mapping to the container's 8000 port
    environment:
      FORGEJO_URL: "https://git.adamoutler.com"
      FORGEJO_TOKEN: "${FORGEJO_TOKEN}"
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
      JENKINS_USER: "${JENKINS_USER}"
      JENKINS_TOKEN: "${JENKINS_TOKEN}"
      LOGS_DIR: "/app/logs"
    volumes:
      - dashboard_data:/app/data
      - dashboard_logs:/app/logs
    restart: unless-stopped

volumes:
  dashboard_data:
  dashboard_logs:
