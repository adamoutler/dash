repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.3.5
    hooks:
      # Run the linter.
      - id: ruff
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: skillsafe
        name: skillsafe
        entry: env CI=1 npx --yes skillsafe@0.2.9 scan . --json
        language: system
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      - id: generate-openapi
        name: Generate OpenAPI Spec
        entry: sh -c 'PYTHONPATH=src python3 -c "import sys, json; from main import app; json.dump(app.openapi(), sys.stdout, indent=2)" > docs/openapi.json'
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-json
        files: \.json$

  - repo: local
    hooks:
      - id: spectral
        name: Spectral Lint
        entry: npx --yes @stoplight/spectral-cli lint docs/openapi.json
        language: system
        pass_filenames: false

  - repo: https://github.com/returntocorp/semgrep
    rev: v1.66.0
    hooks:
      - id: semgrep
        args: ['--config=p/python', '--config=p/fastapi', '--error']