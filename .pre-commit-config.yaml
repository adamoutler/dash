repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.3.5
    hooks:
      # Run the linter.
      - id: ruff
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format

  - repo: local
    hooks:
      - id: skillsafe
        name: skillsafe
        entry: env CI=1 npx --yes skillsafe@0.2.9 scan . --json
        language: system
        pass_filenames: false
        always_run: true