<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dash</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff" id="theme-color-meta">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="apple-touch-icon" href="/static/img/icon-192.png">
    <link rel="stylesheet" href="/static/design-system.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <style>
        .cascading-browser-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 10px;
        }
        .browser-level {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-surface);
            color: var(--text-primary);
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }
        .browser-level:focus {
            outline: none;
            border-color: #0366d6;
            box-shadow: 0 0 0 3px rgba(3, 102, 214, 0.3);
        }
    </style>
</head>
<body>
<div id="offline-banner" style="display:none; background-color: #ffcc00; color: #333; text-align: center; padding: 10px; font-weight: bold; width: 100%;">⚠️ You are offline...</div>
<div id="logModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="document.getElementById('logModal').style.display='none'">&times;</span>
    <h2 id="modalTitle" style="margin-top: 0;">Logs</h2>
    <div id="logContent" class="log-container">Loading...</div>
  </div>
</div>
<div class="container">
    <div id="no-providers-banner" style="display:none; background-color: var(--bg-surface); border: 2px dashed #cb2431; padding: 20px; text-align: center; margin-bottom: 20px; border-radius: 8px;">
        <h2 style="margin-top: 0; color: #cb2431;">No CI Providers Configured</h2>
        <p style="color: var(--text-primary);">You haven't configured any CI providers yet. Please configure at least one provider to start adding repositories.</p>
        <a href="/configure" style="display: inline-block; padding: 10px 20px; background-color: #0366d6; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 10px;">Go to Configuration</a>
    </div>
    <div class="header">
        <h1>Dash</h1>
        <div class="header-right">
            <button id="installAppBtn" style="display:none;" class="add-btn">Install App</button>
            <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Dark Mode">
                <span id="themeIcon">☀️</span>
            </button>
            <button class="add-btn" onclick="toggleForm()" id="addRepoBtn">+ Add Repository</button>
        </div>
    </div>

    <div class="add-form" id="addForm">
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <select id="provider" style="flex: 1; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; background-color: var(--bg-surface); color: var(--text-primary);">
                <option value="github">GitHub</option>
                <option value="forgejo">Forgejo / Gitea</option>
                <option value="jenkins">Jenkins</option>
            </select>
        </div>
        <div id="cascadingBrowser" class="cascading-browser-container"></div>
        <input type="hidden" id="owner" value="">
        <input type="hidden" id="repo" value="">
        <input type="hidden" id="workflow" value="">
        <input type="hidden" id="workflowName" value="">
        <div style="margin-top: 10px; margin-bottom: 10px;">
            <input type="text" id="branchInput" placeholder="Branch (optional, e.g. main)" style="width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; background-color: var(--bg-surface); color: var(--text-primary); box-sizing: border-box;">
        </div>
        <div id="linksContainer">
            <!-- Dynamic links go here -->
        </div>
        <button type="button" class="add-link-btn" onclick="addLinkRow()">+ Add custom link (e.g. Prod, Jenkins, Docs)</button>
        <div style="margin-top: 15px;">
            <button class="add-btn" id="submitBtn" onclick="addRepo()">Add</button>
        </div>
    </div>

    <div class="repo-list" id="repoList">
        <div style="padding: 20px; text-align: center; color: #586069;">Loading statuses...</div>
    </div>

    <footer style="margin-top: 40px; margin-bottom: 20px; text-align: center; font-size: 12px;">
        <a href="/configure" aria-label="Dashboard configuration" style="color: #bbb; text-decoration: none; transition: color 0.2s; margin-right: 15px;" onmouseover="this.style.color='#666'" onmouseout="this.style.color='#bbb'">⚙️ Configure Dashboard</a>
        <a href="/api" aria-label="API Documentation" style="color: #bbb; text-decoration: none; transition: color 0.2s; margin-right: 15px;" onmouseover="this.style.color='#666'" onmouseout="this.style.color='#bbb'">📚 API Docs</a>
        <a href="/llms.txt" aria-label="API automation instructions for AI and LLM agents" style="color: #bbb; text-decoration: none; transition: color 0.2s; margin-right: 15px;" onmouseover="this.style.color='#666'" onmouseout="this.style.color='#bbb'">🤖 LLM API Instructions</a>
    </footer>
</div>

<div id="appVersionDisplay" class="version-display">v0.0.0</div>

<script>
    class CascadingPathBrowser {
        constructor(containerId, providerSelectId) {
            this.container = document.getElementById(containerId);
            this.providerSelect = document.getElementById(providerSelectId);
            this.levels = [];
            this.providerSelect.addEventListener('change', () => this.reset());
        }

        reset() {
            this.container.innerHTML = '';
            this.levels = [];
            this.loadLevel('');
            this.updateHiddenFields();
        }

        async loadLevel(path, levelIndex = 0) {
            while (this.levels.length > levelIndex) {
                this.levels.pop().remove();
            }

            const provider = this.providerSelect.value;
            const select = document.createElement('select');
            select.className = 'browser-level';
            select.innerHTML = '<option value="">Loading...</option>';
            this.container.appendChild(select);
            this.levels.push(select);

            try {
                const res = await fetch(`/api/explore/${provider}/nodes?path=${encodeURIComponent(path)}`);
                if (!res.ok) {
                    let errMsg = 'Failed to fetch';
                    try {
                        const errData = await res.json();
                        errMsg = errData.detail || errData.message || errMsg;
                    } catch(jsonErr) {}
                    throw new Error(errMsg);
                }
                const data = await res.json();

                select.innerHTML = '<option value="">-- Select --</option>';
                data.nodes.forEach(node => {
                    const opt = document.createElement('option');
                    opt.value = node.path;
                    opt.textContent = node.name;
                    opt.dataset.type = node.type;
                    opt.dataset.hasChildren = node.has_children;
                    opt.dataset.url = node.url || '';
                    opt.dataset.id = node.id || '';
                    select.appendChild(opt);
                });

                select.addEventListener('change', () => {
                    const selectedOpt = select.options[select.selectedIndex];
                    if (!selectedOpt || !selectedOpt.value) {
                        while (this.levels.length > levelIndex + 1) {
                            this.levels.pop().remove();
                        }
                        this.updateHiddenFields();
                        return;
                    }

                    if (selectedOpt.dataset.hasChildren === 'true') {
                        this.loadLevel(selectedOpt.value, levelIndex + 1);
                    } else {
                        while (this.levels.length > levelIndex + 1) {
                            this.levels.pop().remove();
                        }
                    }
                    this.updateHiddenFields();
                });

            } catch (e) {
                select.innerHTML = `<option value="">⚠️ ${e.message}</option>`;
                console.error(e);
            }

            this.updateHiddenFields();
        }

        updateHiddenFields() {
            const provider = this.providerSelect.value;
            let owner = '';
            let repo = '';
            let workflowId = '';
            let workflowName = '';

            if (provider === 'jenkins') {
                const parts = [];
                let finalUrl = '';
                for (let i = 0; i < this.levels.length; i++) {
                    const sel = this.levels[i];
                    if (sel && sel.selectedIndex > 0) {
                        const opt = sel.options[sel.selectedIndex];
                        parts.push(opt.textContent);
                        finalUrl = opt.dataset.url || opt.value;
                    }
                }
                if (parts.length > 0) {
                    owner = '';
                    repo = parts.join('/');
                }
            } else {
                if (this.levels[0] && this.levels[0].selectedIndex > 0) {
                    owner = this.levels[0].options[this.levels[0].selectedIndex].dataset.id;
                }
                if (this.levels[1] && this.levels[1].selectedIndex > 0) {
                    repo = this.levels[1].options[this.levels[1].selectedIndex].dataset.id;
                }
                if (this.levels[2] && this.levels[2].selectedIndex > 0) {
                    const opt = this.levels[2].options[this.levels[2].selectedIndex];
                    workflowId = opt.dataset.id;
                    workflowName = opt.textContent;
                }
            }

            document.getElementById('owner').value = owner || '';
            document.getElementById('repo').value = repo || '';
            document.getElementById('workflow').value = workflowId || '';
            document.getElementById('workflowName').value = workflowName || '';
        }

        setEditMode(owner, repo, workflowId, workflowName) {
            this.container.innerHTML = '';
            this.levels = [];

            const createInput = (val, placeholder) => {
                const input = document.createElement('input');
                input.type = 'text';
                input.value = val;
                input.placeholder = placeholder;
                input.readOnly = true;
                input.style.flex = '1';
                input.style.padding = '8px';
                input.style.border = '1px solid var(--border-color)';
                input.style.borderRadius = '4px';
                input.style.backgroundColor = 'var(--bg-primary)';
                input.style.color = 'var(--text-primary)';
                input.style.boxSizing = 'border-box';
                return input;
            };

            const row = document.createElement('div');
            row.style.display = 'flex';
            row.style.gap = '10px';

            row.appendChild(createInput(owner, 'Owner'));
            row.appendChild(createInput(repo, 'Repo'));

            this.container.appendChild(row);

            if (workflowId || workflowName) {
                const wfRow = document.createElement('div');
                wfRow.style.display = 'flex';
                wfRow.style.gap = '10px';
                wfRow.style.marginTop = '10px';
                wfRow.appendChild(createInput(workflowName || workflowId, 'Workflow'));
                this.container.appendChild(wfRow);
            }

            document.getElementById('owner').value = owner || '';
            document.getElementById('repo').value = repo || '';
            document.getElementById('workflow').value = workflowId || '';
            document.getElementById('workflowName').value = workflowName || '';
        }
    }
    let pathBrowser;

    function addLinkRow(name = '', url = '') {
        const container = document.getElementById('linksContainer');
        const row = document.createElement('div');
        row.className = 'link-row';
        row.innerHTML = `
            <input type="text" class="link-name" placeholder="Name (e.g. Prod)" value="${name}">
            <input type="url" class="link-url" placeholder="URL (e.g. https://...)" value="${url}">
            <button type="button" class="remove-link-btn" onclick="this.parentElement.remove()" title="Remove Link">✕</button>
        `;
        container.appendChild(row);
    }

    function toggleForm(isEdit = false, provider = 'github', owner = '', repo = '', customLinksRaw = '', workflowId = '', workflowName = '', branch = '') {
        const form = document.getElementById('addForm');
        const addBtn = document.getElementById('addRepoBtn');
        document.getElementById('linksContainer').innerHTML = ''; // clear links

        if (!pathBrowser) {
            pathBrowser = new CascadingPathBrowser('cascadingBrowser', 'provider');
        }

        let customLinks = [];
        try {
            if (customLinksRaw) customLinks = JSON.parse(decodeURIComponent(customLinksRaw));
        } catch(e) {}

        if (isEdit === true) {
            document.getElementById('provider').value = provider;
            document.getElementById('provider').disabled = true;
            document.getElementById('submitBtn').innerText = 'Update';
            document.getElementById('branchInput').value = branch;

            pathBrowser.setEditMode(owner, repo, workflowId, workflowName);

            customLinks.forEach(link => addLinkRow(link.name, link.url));

            form.style.display = 'block';
            addBtn.innerHTML = '✕';
            addBtn.style.backgroundColor = '#b74b4b'; // non-alerting red
            addBtn.style.padding = '8px 12px';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
            if (form.style.display === 'block' && document.getElementById('submitBtn').innerText !== 'Update') {
                form.style.display = 'none';
                addBtn.innerHTML = '+ Add Repository';
                addBtn.style.backgroundColor = '';
                addBtn.style.padding = '';
            } else {
                document.getElementById('provider').value = 'github';
                document.getElementById('provider').disabled = false;
                document.getElementById('submitBtn').innerText = 'Add';
                document.getElementById('branchInput').value = '';

                pathBrowser.reset();

                form.style.display = 'block';
                addBtn.innerHTML = '✕';
                addBtn.style.backgroundColor = '#b74b4b'; // non-alerting red
                addBtn.style.padding = '8px 12px';
            }
        }
    }

    async function addRepo() {
        const provider = document.getElementById('provider').value;
        const owner = document.getElementById('owner').value.trim();
        const repo = document.getElementById('repo').value.trim();
        const workflow_id = document.getElementById('workflow').value.trim();
        const workflow_name = document.getElementById('workflowName').value.trim();
        const branch = document.getElementById('branchInput').value.trim();

        const linkRows = document.querySelectorAll('.link-row');
        const custom_links = [];
        linkRows.forEach(row => {
            const name = row.querySelector('.link-name').value.trim();
            const url = row.querySelector('.link-url').value.trim();
            if (name && url) {
                custom_links.push({ name, url });
            }
        });

        if (!repo) return;
        if (provider !== 'jenkins' && !owner) return;

        await fetch('/api/repos', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({provider, owner, repo, custom_links, workflow_id, workflow_name, branch: branch || null})
        });

        document.getElementById('submitBtn').innerText = 'Add';
        document.getElementById('provider').disabled = false;
        document.getElementById('linksContainer').innerHTML = '';

        document.getElementById('addForm').style.display = 'none';
        const addBtn = document.getElementById('addRepoBtn');
        addBtn.innerHTML = '+ Add Repository';
        addBtn.style.backgroundColor = '';
        addBtn.style.padding = '';

        if (pathBrowser) pathBrowser.reset();
        fetchStatuses();
    }

    async function removeRepo(provider, owner, repo, workflowId, branch) {
        await fetch('/api/repos', {
            method: 'DELETE',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({provider, owner, repo, workflow_id: workflowId || null, branch: branch || null})
        });
        fetchStatuses();
    }

    function formatTime(isoString) {
        if (!isoString) return "Unknown";
        const d = new Date(isoString);
        return d.toLocaleString();
    }

    function getStatusClass(status) {
        if(status === 'success') return 'status-success';
        if(status === 'failure') return 'status-failure';
        if(status === 'running') return 'status-running';
        if(status === 'unknown' || status === 'skipped' || status === 'cancelled') return 'status-error';
        return 'status-error';
    }

    function getStatusIcon(status) {
        if(status === 'success') return '✔ Pass';
        if(status === 'failure') return '✘ Fail';
        if(status === 'running') return '↻ Run';
        if(status === 'unknown') return '➖ Unknown';
        if(status === 'skipped') return '⏭ Skipped';
        if(status === 'cancelled') return '🛑 Cancelled';
        return '? Error';
    }

    let dashboardData = [];

    function updateProgress() {
        if (!dashboardData) return;
        const now = Date.now();

        dashboardData.forEach(item => {
            let duration = item.expected_duration_sec || item.average_recent_duration || 0;
            if (duration > 0) duration = duration * 1.05; // Add 5% buffer to reduce overtime anxiety
            if (item.status === 'running' && duration > 0 && item.started_at) {
                const repoId = `${item.provider}-${item.owner}-${item.repo}-${item.workflow_id || 'all'}`.replace(/[^a-zA-Z0-9-]/g, '-');
                const progressEl = document.getElementById(`progress-${repoId}`);
                const etaEl = document.getElementById(`eta-${repoId}`);

                if (progressEl && etaEl) {
                    const started = new Date(item.started_at).getTime();
                    const elapsedSec = (now - started) / 1000;

                    if (elapsedSec > duration) {
                        progressEl.style.width = '100%';
                        etaEl.innerText = '(Overtime)';
                    } else {
                        const percent = Math.min(100, Math.max(0, (elapsedSec / duration) * 100));
                        progressEl.style.width = `${percent}%`;
                        const remaining = Math.max(0, Math.ceil(duration - elapsedSec));
                        etaEl.innerText = `(ETA: ${remaining}s)`;
                    }
                }
            }
        });
    }

    async function fetchStatuses() {
        try {
            const res = await fetch('/api/status', { cache: 'no-store' });
            if (res.status === 401) {
                const list = document.getElementById('repoList');
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: #cb2431;">Authentication required. Please refresh the page to login.</div>';
                return;
            }
            dashboardData = await res.json();

            if (!Array.isArray(dashboardData)) {
                const list = document.getElementById('repoList');
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: #cb2431;">Error: Invalid data received from server.</div>';
                return;
            }

            dashboardData.sort((a, b) => {
                const timeA = new Date(a.updated_at || a.started_at || 0).getTime();
                const timeB = new Date(b.updated_at || b.started_at || 0).getTime();
                return timeB - timeA;
            });

            const list = document.getElementById('repoList');
            if (dashboardData.length === 0) {
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: #586069;">No repositories added yet.</div>';
                return;
            }

        list.innerHTML = dashboardData.map(item => {
            const linksHtml = (item.custom_links && item.custom_links.length > 0) ?
                `<div class="custom-links-container">
                    ${item.custom_links.map(link => `<a href="${link.url}" target="_blank" class="custom-link">🔗 ${link.name}</a>`).join('')}
                </div>` : '';

            const customLinksEncoded = encodeURIComponent(JSON.stringify(item.custom_links || []));
            const repoId = `${item.provider}-${item.owner}-${item.repo}-${item.workflow_id || 'all'}-${item.branch || 'all'}`.replace(/[^a-zA-Z0-9-]/g, '-');

            let progressHtml = '';
            let duration = item.expected_duration_sec || item.average_recent_duration || 0;
            if (duration > 0) duration = duration * 1.05; // Add 5% buffer to reduce overtime anxiety
            if (item.status === 'running' && duration > 0 && item.started_at) {
                progressHtml = `
                    <div style="width: 80%; height: 4px; background: rgba(0,0,0,0.1); margin-top: 5px; position: relative; border-radius: 2px; overflow: hidden;">
                        <div id="progress-${repoId}" style="height: 100%; background: #f57f17; width: 0%; transition: width 1s linear;"></div>
                    </div>
                    <div id="eta-${repoId}" style="font-size: 11px; margin-top: 3px; font-weight: normal; line-height: 1.2;">Calculating...</div>
                `;
            }

            const wfDisplay = item.workflow_name ? ` <span style="font-size: 14px; color: #586069; font-weight: normal;">(${item.workflow_name})</span>` : '';
            const branchDisplay = item.branch ? ` <span style="font-size: 14px; color: #586069; font-weight: normal;">[${item.branch}]</span>` : '';
            const displayName = item.display_name ? item.display_name : (item.provider === 'jenkins' ? item.repo : `${item.owner}/${item.repo}`);

            let baseUrl = '';
            try {
                baseUrl = new URL(item.repo_url !== '#' ? item.repo_url : item.url).origin;
            } catch (e) {
                baseUrl = 'https://github.com';
            }

            let iconPath = '/favicon.ico';
            if (item.provider === 'forgejo') {
                iconPath = '/assets/img/favicon.svg';
            }

            const faviconHtml = `<img src="${baseUrl}${iconPath}" class="provider-icon provider-${item.provider}" style="width: 18px; height: 18px; margin-right: 8px; vertical-align: middle;" onerror="this.style.display='none'">`;

            return `
            <div class="repo-item">
                <a href="${item.url}" target="_blank" class="status-block ${getStatusClass(item.status)}" style="${progressHtml ? 'flex-direction: column; padding: 10px; gap: 4px;' : ''}">
                    <div>${getStatusIcon(item.status)}</div>
                    ${progressHtml}
                </a>                <div class="info-block">
                    <div class="info-header">
                        <div style="display: flex; flex-direction: column; flex-grow: 1; min-width: 0; gap: 2px;">
                            <a href="${item.repo_url}" target="_blank" style="text-decoration: none; color: inherit; display: flex; align-items: center; min-width: 0;">
                                ${faviconHtml}<span class="repo-name">${displayName}${branchDisplay}${wfDisplay}</span>
                            </a>
                            <span class="time-text">${formatTime(item.updated_at)}</span>
                        </div>
                        <div class="actions-container">
                            <button class="icon-btn" style="color: #6a737d;" onclick="fetchLogs('${item.provider}', '${item.owner}', '${item.repo}', '${item.workflow_id || ''}')" title="View Logs">📄</button>
                            <button class="icon-btn edit-btn" onclick="toggleForm(true, '${item.provider}', '${item.owner}', '${item.repo}', '${customLinksEncoded}', '${item.workflow_id || ''}', '${item.workflow_name || ''}', '${item.branch || ''}')" title="Edit">✎</button>
                            <button class="icon-btn delete-btn" onclick="removeRepo('${item.provider}', '${item.owner}', '${item.repo}', '${item.workflow_id || ''}', '${item.branch || ''}')" title="Remove">✕</button>
                        </div>
                    </div>
                    <a href="${item.repo_url}" target="_blank" style="text-decoration: none; color: inherit;">
                        <div class="commit-msg">${item.commit_message || 'No commit info'}</div>
                    </a>
                    ${linksHtml}
                </div>
            </div>
        `}).join('');
        } catch (e) {
            console.error("Error fetching statuses:", e);
            const list = document.getElementById('repoList');
            list.innerHTML = '<div style="padding: 20px; text-align: center; color: #cb2431;">Error fetching data. Check console for details.</div>';
        }
    }

    function updateThemeIcon() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const icon = document.getElementById('themeIcon');
        if (icon) {
            icon.innerText = currentTheme === 'dark' ? '🌙' : '☀️';
        }
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        document.getElementById('theme-color-meta').setAttribute('content', newTheme === 'dark' ? '#161b22' : '#ffffff');
        updateThemeIcon();
    }

    // Set initial icon on load
    updateThemeIcon();

    let availableProviders = [];

    async function fetchProviders() {
        try {
            const res = await fetch('/api/providers');
            if (res.ok) {
                const data = await res.json();
                availableProviders = data.providers || [];

                const providerSelect = document.getElementById('provider');
                Array.from(providerSelect.options).forEach(opt => {
                    if (availableProviders.includes(opt.value)) {
                        opt.style.display = 'block';
                    } else {
                        opt.style.display = 'none';
                    }
                });

                // Select the first available provider if current is hidden
                if (!availableProviders.includes(providerSelect.value) && availableProviders.length > 0) {
                    providerSelect.value = availableProviders[0];
                }

                if (availableProviders.length === 0) {
                    document.getElementById('no-providers-banner').style.display = 'block';
                    document.getElementById('addRepoBtn').style.display = 'none';
                    document.getElementById('addForm').style.display = 'none';
                } else {
                    document.getElementById('no-providers-banner').style.display = 'none';
                    document.getElementById('addRepoBtn').style.display = 'inline-block';
                }
            }
        } catch (e) {
            console.error("Error fetching providers:", e);
        }
    }

    async function fetchVersion() {
        try {
            const res = await fetch('/api/version');
            if (res.ok) {
                const data = await res.json();
                document.getElementById('appVersionDisplay').innerText = `v${data.version}`;
            }
        } catch (e) {
            console.error("Error fetching version:", e);
        }
    }

    fetchProviders();
    fetchVersion();

    // Initial fetch and poll every 15s
    fetchStatuses();
    setInterval(fetchStatuses, 15000);
    setInterval(updateProgress, 1000);

    async function fetchLogs(provider, owner, repo, workflowId) {
        document.getElementById('modalTitle').innerText = `Logs: ${owner}/${repo}${workflowId ? ' (' + workflowId + ')' : ''}`;
        const logContent = document.getElementById('logContent');
        logContent.innerHTML = 'Loading logs...';
        document.getElementById('logModal').style.display = 'block';

        let url = `/api/logs?provider=${encodeURIComponent(provider)}&owner=${encodeURIComponent(owner)}&repo=${encodeURIComponent(repo)}`;
        if (workflowId) {
            url += `&workflow_id=${encodeURIComponent(workflowId)}`;
        }

        try {
            const res = await fetch(url, { cache: 'no-store' });
            const data = await res.json();

            // Format log message links for Forgejo
            if (data.log && data.log.includes('href=')) {
                logContent.innerHTML = data.log;
            } else {
                logContent.innerText = data.log || 'No logs returned.';
            }

            // Scroll to bottom
            setTimeout(() => { logContent.scrollTop = logContent.scrollHeight; }, 100);
        } catch (e) {
            logContent.innerText = 'Error fetching logs: ' + e.message;
        }
    }

    // Close modal when clicking outside of it
    window.onclick = function(event) {
        const modal = document.getElementById('logModal');
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }

    // PWA Service Worker Registration & Installation
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                console.log('ServiceWorker registered:', reg.scope);
            }).catch(err => {
                console.log('ServiceWorker registration failed:', err);
            });
        });
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        const installBtn = document.getElementById('installAppBtn');
        if (installBtn) {
            installBtn.style.display = 'inline-block';
            installBtn.addEventListener('click', async () => {
                installBtn.style.display = 'none';
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response to the install prompt: ${outcome}`);
                deferredPrompt = null;
            });
        }
    });

    window.addEventListener('appinstalled', (evt) => {
        console.log('App installed');
    });

    window.addEventListener('online', () => {
        const offlineBanner = document.getElementById('offline-banner');
        if (offlineBanner) offlineBanner.style.display = 'none';
    });
    window.addEventListener('offline', () => {
        const offlineBanner = document.getElementById('offline-banner');
        if (offlineBanner) offlineBanner.style.display = 'block';
    });
</script>
</body>
</html>
