name: build test release

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - '**'

permissions:
  contents: write
  packages: write

jobs:
  build_test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov httpx

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run SafeSkill Check
      run: |
        npx --yes skillsafe@0.2.9 scan . --json

    - name: Run Lint
      run: |
        pip install ruff
        ruff check .

    - name: Run Tests
      run: |
        python -m pytest -v 2>&1 | tee job-logs.txt

    - name: Run Promptfoo Eval
      run: |
        npx --yes promptfoo@latest eval

    - name: Run Schemathesis
      run: |
        python -m pip install schemathesis uvicorn
        PYTHONPATH=src uvicorn src.main:app --host 127.0.0.1 --port 8000 &
        sleep 5
        schemathesis run http://127.0.0.1:8000/openapi.json --checks not_a_server_error --request-timeout 60

    - name: Upload logs to Dashboard
      if: always()
      run: |
        curl -X POST "https://dash.hackedyour.info/api/logs?provider=github&owner=${{ github.repository_owner }}&repo=${{ github.event.repository.name }}" \
             -H "Content-Type: text/plain" \
             --data-binary @job-logs.txt 2>/dev/null || true

  release:
    name: Release to GHCR (Dev)
    needs: build_test
    # Only run release on push to master/main, skip for pull requests
    if: github.event_name == 'push' && github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Lowercase repository owner
      id: lowercase
      run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

    - name: Set Version
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        PREFIX=$(cat VERSION)
        COMMIT_COUNT=$(git rev-list --count HEAD)
        RELEASES_COUNT=$(gh release list | grep -c . || echo "0")
        VERSION_STRING="v${PREFIX}.${RELEASES_COUNT}.${COMMIT_COUNT}"
        echo "VERSION=${VERSION_STRING}" >> $GITHUB_ENV
        # Bake into src/VERSION for the docker image
        echo "${VERSION_STRING}" > src/VERSION

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ env.OWNER }}/dash-dev

    - name: Build Docker image for scanning
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        load: true
        tags: ghcr.io/${{ env.OWNER }}/dash-dev:latest
        labels: ${{ steps.meta.outputs.labels }}

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ghcr.io/${{ env.OWNER }}/dash-dev:latest
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/${{ env.OWNER }}/dash-dev:latest,ghcr.io/${{ env.OWNER }}/dash-dev:${{ github.sha }}
        labels: ${{ steps.meta.outputs.labels }}
