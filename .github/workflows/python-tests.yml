name: Python Unit Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies and Run Tests
      run: |
        {
          echo "=== Installing Dependencies ==="
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "=== Running Tests ==="
          python -m pytest -v
        } 2>&1 | tee job-logs.txt

    - name: Upload logs to Dashboard
      if: always()
      run: |
        curl -X POST "https://dash.hackedyour.info/api/logs?provider=forgejo&owner=Updates&repo=gitdash" \
             -H "Content-Type: text/plain" \
             --data-binary @job-logs.txt || true
