name: Python Unit Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests with pytest
      run: |
        python -m pytest -v | tee pytest-logs.txt

    - name: Upload test logs to dashboard
      if: always()
      run: |
        curl -X POST "https://dash.hackedyour.info/api/logs?provider=forgejo&owner=${{ github.repository_owner }}&repo=${{ github.event.repository.name }}" \
             -H "Content-Type: text/plain" \
             --data-binary @pytest-logs.txt || true

    - name: Upload test results artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pytest-logs
        path: pytest-logs.txt
