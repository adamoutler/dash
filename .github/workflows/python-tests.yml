name: Python Unit Tests

on:
  push:
    branches:
      - master
      - main
      - '**'
  pull_request:
    branches:
      - master
      - main
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize Log File
      run: echo "Starting CI run..." > job-logs.txt

    - name: Install dependencies and Run Tests
      run: |
        {
          echo "=== Environment Info ==="
          python3 --version || echo "python3 not found"

          echo "=== Installing Dependencies ==="
          # Try to install venv if missing
          sudo apt-get update && sudo apt-get install -y python3-venv python3-pip || echo "apt-get failed, continuing..."

          python3 -m venv .venv || echo "venv creation failed"
          if [ -f ".venv/bin/activate" ]; then
            source .venv/bin/activate
          fi

          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

          echo "=== Running Tests ==="
          python3 -m pytest -v
        } 2>&1 | tee -a job-logs.txt

    - name: Upload logs to Dashboard
      if: always()
      run: |
        echo "Uploading logs..." >> job-logs.txt
        curl -X POST "https://dash.hackedyour.info/api/logs?provider=forgejo&owner=Updates&repo=gitdash" \
             -H "Content-Type: text/plain" \
             --data-binary @job-logs.txt || true
