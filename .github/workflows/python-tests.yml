name: Python Unit Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: python:3.12

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize Log File
      run: echo "Starting CI run..." > job-logs.txt

    - name: Install dependencies and Run Tests
      run: |
        {
          echo "=== Environment Info ==="
          python --version || echo "python not found"

          echo "=== Installing Dependencies ==="
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          echo "=== Running Tests ==="
          python -m pytest -v
        } 2>&1 | tee -a job-logs.txt

    - name: Upload logs to Dashboard
      if: always()
      run: |
        echo "Uploading logs..." >> job-logs.txt
        # If curl is not installed in the python:3.12 container, install it
        apt-get update && apt-get install -y curl || echo "curl already installed"
        curl -X POST "https://dash.hackedyour.info/api/logs?provider=forgejo&owner=Updates&repo=gitdash" \
             -H "Content-Type: text/plain" \
             --data-binary @job-logs.txt || true
