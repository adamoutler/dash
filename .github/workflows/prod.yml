name: production build test release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build_test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov httpx

    - name: Run Lint
      run: |
        pip install ruff
        ruff check . || echo "Ruff failed, but continuing for now"

    - name: Run Tests
      run: |
        python -m pytest -v 2>&1 | tee job-logs.txt

    - name: Upload logs to Dashboard
      if: always()
      run: |
        curl -X POST "https://dash.hackedyour.info/api/logs?provider=github&owner=${{ github.repository_owner }}&repo=${{ github.event.repository.name }}" \
             -H "Content-Type: text/plain" \
             --data-binary @job-logs.txt 2>/dev/null || true

  release:
    name: Release to GHCR (Prod)
    needs: build_test
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Lowercase repository owner
      id: lowercase
      run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

    - name: Set Version
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        PREFIX=$(cat VERSION)
        COMMIT_COUNT=$(git rev-list --count HEAD)
        RELEASES_COUNT=$(gh release list | grep -c . || echo "0")
        VERSION_STRING="v${PREFIX}.${RELEASES_COUNT}.${COMMIT_COUNT}"
        echo "VERSION=${VERSION_STRING}" >> $GITHUB_ENV
        # Bake into src/VERSION for the docker image
        echo "${VERSION_STRING}" > src/VERSION

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ env.OWNER }}/dash
        tags: |
          type=raw,value=latest
          type=raw,value=${{ env.VERSION }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.VERSION }}
        name: Release ${{ env.VERSION }}
        body: |
          Release ${{ env.VERSION }}

          **Container Image:**
          `docker pull ghcr.io/${{ env.OWNER }}/dash:${{ env.VERSION }}`
        generate_release_notes: true
