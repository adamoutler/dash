name: production build test release

on:
  workflow_dispatch:

jobs:
  build_test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov httpx

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Run SafeSkill Check
      run: |
        npx --yes skillsafe@0.2.9 scan . --json

    - name: Run Lint
      run: |
        pip install ruff
        ruff check .

    - name: Run Tests
      run: |
        python -m pytest --cov=src --cov=cli --cov-report=xml -v 2>&1 | tee job-logs.txt

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v7
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Upload logs to Dashboard
      if: always()
      run: |
        curl -X POST "https://dash.hackedyour.info/api/logs?provider=github&owner=${{ github.repository_owner }}&repo=${{ github.event.repository.name }}" \
             -H "Content-Type: text/plain" \
             --data-binary @job-logs.txt 2>/dev/null || true

  release:
    name: Release to GHCR (Prod)
    needs: build_test
    permissions:
      contents: write
      packages: write
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Lowercase repository owner
      id: lowercase
      run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

    - name: Set Version
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        PREFIX=$(cat VERSION)
        COMMIT_COUNT=$(git rev-list --count HEAD)
        RELEASES_COUNT=$(gh release list | grep -c . || echo "0")
        VERSION_STRING="v${PREFIX}.${RELEASES_COUNT}.${COMMIT_COUNT}"
        echo "VERSION=${VERSION_STRING}" >> $GITHUB_ENV
        # Bake into src/VERSION for the docker image
        echo "${VERSION_STRING}" > src/VERSION

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to the Container registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/${{ env.OWNER }}/dash
          ${{ secrets.DOCKERHUB_USERNAME }}/dash
        tags: |
          type=raw,value=latest
          type=raw,value=${{ env.VERSION }}

    - name: Build Docker image for scanning
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        load: true
        tags: ghcr.io/${{ env.OWNER }}/dash:latest
        labels: ${{ steps.meta.outputs.labels }}

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ghcr.io/${{ env.OWNER }}/dash:latest
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Update Docker Hub Description
      uses: peter-evans/dockerhub-description@v4
      continue-on-error: true # Fails with 403 if the token lacks admin privileges or the repo doesn't exist yet
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        repository: ${{ secrets.DOCKERHUB_USERNAME }}/dash
        short-description: ${{ github.event.repository.description }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.VERSION }}
        name: Release ${{ env.VERSION }}
        body: |
          Release ${{ env.VERSION }}

          **Container Image:**
          `docker pull ghcr.io/${{ env.OWNER }}/dash:${{ env.VERSION }}`
        generate_release_notes: true
